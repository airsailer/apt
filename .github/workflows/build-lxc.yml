name: Build and Publish LXC & LXCFS 7.0 to APT Repo

on:
  workflow_dispatch:

jobs:
  build-packages:
    # Run a matrix: build once for Ubuntu Noble, once for Debian Trixie
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: noble
            container_image: ubuntu:24.04
          - os: trixie
            container_image: debian:trixie

    container:
      image: ${{ matrix.container_image }}

    steps:
      - name: Install Git (Required for Checkout)
        run: |
          apt-get update
          apt-get install -y git curl wget

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Build Dependencies
        run: |
          apt-get update
          # fuse3 might prompt for timezone interactively, so we make it non-interactive
          DEBIAN_FRONTEND=noninteractive apt-get install -y tzdata build-essential meson ninja-build pkg-config \
            libapparmor-dev libseccomp-dev libcap-dev libpam0g-dev \
            libselinux1-dev libdbus-1-dev python3-jinja2 \
            libfuse3-dev help2man \
            ruby ruby-dev rubygems \
            docbook2x docbook-utils \
            libssl-dev libsystemd-dev
          gem install fpm

      # ==========================================
      # 1. BUILD AND PACKAGE LXC
      # ==========================================
      - name: Download and Extract LXC
        run: |
          wget https://linuxcontainers.org/downloads/lxc/lxc-7.0.0.tar.gz
          tar -xzf lxc-7.0.0.tar.gz

      - name: Compile and Stage LXC
        run: |
          cd lxc-7.0.0
          meson setup build \
            --prefix=/usr \
            --sysconfdir=/etc \
            --localstatedir=/var \
            -Dapparmor=true \
            -Dseccomp=true \
            -Dcapabilities=true
          meson compile -C build
          DESTDIR=$(pwd)/../lxc-staging meson install -C build

      - name: Package LXC into .deb
        run: |
          # Append ~${{ matrix.os }} to the version string
          fpm -s dir -t deb \
            -n lxc \
            -v "7.0.0-airsailer1~${{ matrix.os }}" \
            --architecture amd64 \
            --description "LXC 7.0 LTS Custom Build for Airsailer" \
            --maintainer "Airsailer <support@airsailer.io>" \
            --depends libapparmor1 \
            --depends libseccomp2 \
            --depends libcap2 \
            --depends libselinux1 \
            --depends uidmap \
            --after-install scripts/lxc-post-install.sh \
            --before-remove scripts/lxc-pre-remove.sh \
            -C lxc-staging .

          mkdir -p packages
          mv lxc_*.deb packages/

      # ==========================================
      # 2. BUILD AND PACKAGE LXCFS
      # ==========================================
      - name: Download and Extract LXCFS
        run: |
          wget https://github.com/lxc/lxcfs/releases/download/v7.0.0/lxcfs-7.0.0.tar.gz
          tar -xzf lxcfs-7.0.0.tar.gz

      - name: Compile and Stage LXCFS
        run: |
          cd lxcfs-7.0.0
          meson setup -Dinit-script=systemd --prefix=/usr build/
          meson compile -C build/
          DESTDIR=$(pwd)/../lxcfs-staging meson install -C build/

      - name: Tweak LXCFS Systemd Service
        run: |
          SERVICE_FILE=$(find lxcfs-staging -name "lxcfs.service")
          sed -i 's|ExecStart=/usr/bin/lxcfs /var/lib/lxcfs|ExecStart=/usr/bin/lxcfs --enable-loadavg --enable-cfs /var/lib/lxcfs|' "$SERVICE_FILE"

      - name: Package LXCFS into .deb
        run: |
          fpm -s dir -t deb \
            -n lxcfs \
            -v "7.0.0-airsailer1~${{ matrix.os }}" \
            --architecture amd64 \
            --description "LXCFS 7.0 LTS Custom Build for Airsailer" \
            --maintainer "Airsailer <support@airsailer.io>" \
            --depends fuse3 \
            --after-install scripts/lxcfs-post-install.sh \
            --before-remove scripts/lxcfs-pre-remove.sh \
            -C lxcfs-staging .

          mv lxcfs_*.deb packages/

      # Upload the compiled packages so the publish job can grab them
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-packages-${{ matrix.os }}
          path: packages/*.deb

  publish-repo:
    needs: build-packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Reprepro
        run: sudo apt-get update && sudo apt-get install -y reprepro

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-packages
          merge-multiple: true

      - name: Import GPG Key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Setup APT Repository with reprepro
        run: |
          git clone --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git repo-pages || git init repo-pages

          cd repo-pages
          mkdir -p conf

          # Add BOTH distributions to the config
          cat <<EOF > conf/distributions
          Origin: Airsailer
          Label: Airsailer Packages
          Codename: noble
          Architectures: amd64
          Components: main
          Description: Airsailer Official Repository (Ubuntu 24.04)
          SignWith: ${{ steps.import_gpg.outputs.keyid }}

          Origin: Airsailer
          Label: Airsailer Packages
          Codename: trixie
          Architectures: amd64
          Components: main
          Description: Airsailer Official Repository (Debian 13)
          SignWith: ${{ steps.import_gpg.outputs.keyid }}
          EOF

          # Because we might have existing DB files that conflict, we force inclusion
          reprepro -b . includedeb noble ../downloaded-packages/*~noble_amd64.deb
          reprepro -b . includedeb trixie ../downloaded-packages/*~trixie_amd64.deb

          cp ../public.key ./airsailer-archive-keyring.asc

      - name: Push to GitHub Pages Branch
        run: |
          cd repo-pages
          git checkout -B gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git || git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add .
          git commit -m "Update APT repository with Noble & Trixie builds" || echo "No changes to commit"
          git push -u origin gh-pages --force
